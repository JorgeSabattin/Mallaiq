<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso — MallaIQ</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #fff; --bg2: #f5f5f3; --t1: #1a1a18; --t2: #5a5a56;
  --b2: rgba(0,0,0,.10); --r: 8px; --rl: 12px;
  --accent: #1a5fa5; --danger-bg: #fdecea; --danger: #7f1d1d;
}
@media (prefers-color-scheme: dark) {
  :root { --bg: #1c1c1a; --bg2: #252523; --t1: #e8e8e2; --t2: #a0a09a;
          --b2: rgba(255,255,255,.10); }
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
       background: var(--bg2); color: var(--t1); min-height: 100vh;
       display: flex; align-items: center; justify-content: center; }
.box {
  width: 100%; max-width: 380px; padding: 0 20px;
}
.logo {
  text-align: center; margin-bottom: 28px;
}
.logo-icon {
  width: 52px; height: 52px; background: var(--accent);
  border-radius: 14px; display: flex; align-items: center;
  justify-content: center; margin: 0 auto 12px;
}
.logo h1 { font-size: 22px; font-weight: 600; letter-spacing: -.3px; }
.logo p  { font-size: 12px; color: var(--t2); margin-top: 3px; }
.card {
  background: var(--bg); border: .5px solid var(--b2);
  border-radius: var(--rl); padding: 24px;
}
label { font-size: 11.5px; font-weight: 500; color: var(--t2);
        display: block; margin-bottom: 5px; }
input {
  width: 100%; padding: 9px 12px; border: .5px solid var(--b2);
  border-radius: var(--r); font-size: 13px; font-family: inherit;
  background: var(--bg); color: var(--t1); margin-bottom: 14px;
  transition: border-color .1s;
}
input:focus { outline: none; border-color: var(--accent); }
.btn {
  width: 100%; padding: 10px; background: var(--t1); color: var(--bg);
  border: none; border-radius: var(--r); font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit; display: flex;
  align-items: center; justify-content: center; gap: 7px;
}
.btn:hover { opacity: .85; }
.alert {
  background: var(--danger-bg); color: var(--danger);
  border: .5px solid #f0a09a; border-radius: var(--r);
  padding: 9px 12px; font-size: 12px; margin-bottom: 14px;
  display: flex; align-items: center; gap: 7px;
}
.footer-txt {
  text-align: center; font-size: 10.5px; color: var(--t2); margin-top: 18px;
}
</style>
</head>
<body>
<div class="box">
  <div class="logo">
    <div class="logo-icon">
      <i class="ti ti-chart-grid-dots" style="font-size:26px;color:#fff"></i>
    </div>
    <h1>MallaIQ</h1>
    <p>Análisis de estrés de malla curricular</p>
  </div>

  <div class="card">
    {% if messages %}
      {% for m in messages %}
      <div class="alert">
        <i class="ti ti-alert-triangle" style="font-size:15px;flex-shrink:0"></i>
        {{ m }}
      </div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <label for="username">Usuario</label>
      <input type="text" id="username" name="username"
             autofocus required placeholder="nombre.apellido">
      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password"
             required placeholder="••••••••">
      <button type="submit" class="btn">
        <i class="ti ti-login"></i> Ingresar
      </button>
    </form>
  </div>

  <div class="footer-txt">
    MallaIQ · UNAB Campus Antonio Varas · 2026
  </div>
</div>
</body>
</html>
